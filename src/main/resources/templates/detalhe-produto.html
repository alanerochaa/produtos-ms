<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhe do Produto</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="page-container page-spacing">

    <div th:replace="~{fragments :: navbar('produtos')}"></div>

    <section class="card">
        <div class="section-header">
            <div>
                <h1 class="section-title">Detalhe do produto</h1>
                <p class="section-subtitle">Visualização dos dados do produto selecionado.</p>
            </div>
        </div>

        <div class="form-grid">

            <div class="form-row">
                <label class="form-label">Código</label>
                <input type="text" th:value="${produto.id}" readonly class="form-input">
            </div>

            <div class="form-row">
                <label class="form-label">Nome</label>
                <input type="text" th:value="${produto.nome}" readonly class="form-input">
            </div>

            <div class="form-row">
                <label class="form-label">Descrição</label>
                <input type="text" th:value="${produto.descricao}" readonly class="form-input">
            </div>

            <div class="form-row">
                <label class="form-label">Preço</label>
                <input type="text" th:value="${produto.preco}" readonly class="form-input">
            </div>

            <div class="form-row">
                <label class="form-label">Categoria</label>
                <input type="text" th:value="${produto.categoria}" readonly class="form-input">
            </div>

            <div class="form-actions">
                <a th:href="@{/produtos}" class="btn btn-secondary">Voltar</a>
                <a th:href="@{/produtos/editar/{id}(id=${produto.id})}" class="btn btn-primary">Editar</a>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>Desenvolvido por <strong>Alane Rocha</strong> e <strong>Maria Eduarda</strong></p>
    </footer>
</div>
</body>
</html>
