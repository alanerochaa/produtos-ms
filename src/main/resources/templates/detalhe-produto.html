<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhe do Produto</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="page-container">

    <div th:replace="~{fragments :: navbar('produtos')}"></div>

    <section class="card">
        <h1 class="page-title">Cadastro de produto</h1>

        <form th:action="@{/produtos/salvar}" th:object="${produto}" method="post" class="form-grid">

            <div class="form-group">
                <label for="id" class="form-label">Código</label>
                <input id="id" type="text" th:field="*{id}" readonly class="form-input">
            </div>

            <div class="form-group">
                <label for="nome" class="form-label">Nome</label>
                <input id="nome" type="text" th:field="*{nome}" class="form-input" placeholder="Digite o nome do produto">
            </div>

            <div class="form-group">
                <label for="descricao" class="form-label">Descrição</label>
                <input id="descricao" type="text" th:field="*{descricao}" class="form-input" placeholder="Digite a descrição do produto">
            </div>

            <div class="form-group">
                <label for="preco" class="form-label">Preço</label>
                <input id="preco" type="number" step="0.01" th:field="*{preco}" class="form-input" placeholder="Digite o preço">
            </div>

            <div class="form-group">
                <label for="categoria" class="form-label">Categoria</label>
                <input id="categoria" type="text" th:field="*{categoria}" class="form-input" placeholder="Digite a categoria">
            </div>

            <div class="form-actions">
                <a th:href="@{/produtos}" class="btn btn-secondary">Voltar</a>
                <button type="submit" class="btn btn-primary">Salvar</button>
            </div>
        </form>
    </section>
</div>
</body>
</html>
