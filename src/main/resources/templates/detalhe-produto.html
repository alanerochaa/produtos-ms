<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descrição do Produto</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="page-container page-spacing">

    <div th:replace="~{fragments :: navbar('produtos')}"></div>

    <section class="card product-detail-card">

        <div class="product-detail-header">
            <span class="badge-soft">Descrição do item</span>

            <h1 class="product-detail-title" th:text="${produto.nome}">
                Nome do produto
            </h1>

            <p class="product-detail-subtitle">
                Visualização descritiva do produto selecionado.
            </p>
        </div>

        <div class="product-description-block">
            <h2 class="product-section-title">Descrição</h2>

            <div class="product-description-content"
                 th:text="${produto.descricao != null and !#strings.isEmpty(produto.descricao) ? produto.descricao : 'Nenhuma descrição cadastrada para este item.'}">
                Descrição do produto
            </div>
        </div>

        <div class="product-meta-grid">

            <div class="product-meta-card">
                <span class="product-meta-label">Categoria</span>
                <span class="product-meta-value" th:text="${produto.categoria}">
                    Categoria
                </span>
            </div>

            <div class="product-meta-card">
                <span class="product-meta-label">Preço</span>
                <span class="product-meta-value"
                      th:text="${#numbers.formatDecimal(produto.preco, 1, 'POINT', 2, 'COMMA')}">
                    0,00
                </span>
            </div>

            <div class="product-meta-card">
                <span class="product-meta-label">Identificador</span>
                <span class="product-meta-value code-text"
                      th:title="${produto.id}"
                      th:text="${produto.id}">
                    ID do produto
                </span>
            </div>

        </div>

        <div class="form-actions">
            <a th:href="@{/produtos}" class="btn btn-secondary">Voltar</a>
            <a th:href="@{/produtos/editar/{id}(id=${produto.id})}" class="btn btn-primary">Editar</a>
        </div>

    </section>

    <footer class="footer">
        <p>Desenvolvido por <strong>Alane Rocha</strong> e <strong>Maria Eduarda</strong></p>
    </footer>
</div>
</body>
</html>
