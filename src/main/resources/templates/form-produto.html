<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modoEdicao} ? 'Editar Produto' : 'Novo Produto'">Produto</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="page-container page-spacing">

    <div th:replace="~{fragments :: navbar('produtos')}"></div>

    <section class="card">
        <div class="section-header">
            <div>
                <h1 class="section-title"
                    th:text="${modoEdicao} ? 'Editar produto' : 'Cadastro de produto'">
                    Cadastro de produto
                </h1>
                <p class="section-subtitle"
                   th:text="${modoEdicao} ? 'Atualize os dados do produto selecionado.' : 'Preencha os dados abaixo para cadastrar um novo produto.'">
                    Preencha os dados abaixo para cadastrar um produto.
                </p>
            </div>
        </div>

        <form th:action="@{/produtos/salvar}" th:object="${produto}" method="post" class="form-grid">

            <div class="form-row">
                <label for="id" class="form-label">Código</label>
                <input id="id" type="text" th:field="*{id}" readonly class="form-input">
            </div>

            <div class="form-row">
                <label for="nome" class="form-label">Nome</label>
                <div>
                    <input id="nome" type="text" th:field="*{nome}" class="form-input"
                           placeholder="Digite o nome do produto">
                    <small class="field-error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></small>
                </div>
            </div>

            <div class="form-row">
                <label for="descricao" class="form-label">Descrição</label>
                <div>
                    <textarea id="descricao" th:field="*{descricao}" class="form-input form-textarea"
                              placeholder="Digite a descrição do produto"></textarea>
                    <small class="field-error" th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}"></small>
                </div>
            </div>

            <div class="form-row">
                <label for="preco" class="form-label">Preço</label>
                <div>
                    <input id="preco" type="number" step="0.01" min="0.01"
                           th:field="*{preco}" class="form-input" placeholder="Digite o preço">
                    <small class="field-error" th:if="${#fields.hasErrors('preco')}" th:errors="*{preco}"></small>
                </div>
            </div>

            <div class="form-row">
                <label for="categoria" class="form-label">Categoria</label>
                <div>
                    <input id="categoria" type="text" th:field="*{categoria}" class="form-input"
                           placeholder="Digite a categoria do produto">
                    <small class="field-error" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></small>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/produtos}" class="btn btn-secondary">Voltar</a>
                <button type="submit"
                        class="btn btn-primary"
                        th:text="${modoEdicao} ? 'Atualizar' : 'Salvar'">
                    Salvar
                </button>
            </div>
        </form>
    </section>

    <footer class="footer">
        <p>Desenvolvido por <strong>Alane Rocha</strong> e <strong>Maria Eduarda</strong></p>
    </footer>
</div>
</body>
</html>
