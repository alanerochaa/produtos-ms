<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modoEdicao} ? 'Editar Produto' : 'Novo Produto'">Produto</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="page-container page-spacing">

    <div th:replace="~{fragments :: navbar('produtos')}"></div>

    <section class="card">
        <div class="section-header">
            <div>
                <h1 class="section-title"
                    th:text="${modoEdicao} ? 'Editar produto' : 'Cadastro de produto'">
                    Título
                </h1>
            </div>
        </div>

        <div th:if="${erro}" class="alert alert-error" th:text="${erro}">
            Mensagem de erro
        </div>

        <form th:action="@{/produtos/salvar}" th:object="${produto}" method="post" class="form-grid">

            <input type="hidden" name="modoEdicao" th:value="${modoEdicao}">

            <div class="form-row">
                <label class="form-label">Identificador</label>
                <input type="text" th:field="*{id}" readonly class="form-input">
            </div>

            <div class="form-row">
                <label class="form-label">Nome</label>
                <input type="text" th:field="*{nome}" class="form-input">
            </div>

            <div class="form-row">
                <label class="form-label">Descrição</label>
                <textarea th:field="*{descricao}" class="form-input form-textarea"></textarea>
            </div>

            <div class="form-row">
                <label class="form-label">Preço</label>
                <input type="number" step="0.01" th:field="*{preco}" class="form-input">
            </div>

            <div class="form-row">
                <label class="form-label">Categoria</label>
                <input type="text" th:field="*{categoria}" class="form-input">
            </div>

            <div class="form-actions">
                <a th:href="@{/produtos}" class="btn btn-secondary">Voltar</a>
                <button type="submit" class="btn btn-primary">Salvar</button>
            </div>
        </form>
    </section>

</div>
</body>
</html>
